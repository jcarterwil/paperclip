services:
  - type: web
    name: paperclip
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: starter
    envVars:
      - key: PORT
        value: "3100"
      - key: HOST
        value: "0.0.0.0"
      - key: NODE_ENV
        value: production
      - key: SERVE_UI
        value: "true"
      - key: PAPERCLIP_HOME
        value: /paperclip
      - key: PAPERCLIP_DEPLOYMENT_MODE
        value: authenticated
      - key: PAPERCLIP_DEPLOYMENT_EXPOSURE
        value: private
      - key: BETTER_AUTH_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: paperclip-db
          property: connectionString

databases:
  - name: paperclip-db
    plan: starter
    databaseName: paperclip
    user: paperclip
